<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#0f9bff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 深色背景 -->
  <rect width="400" height="400" fill="url(#bg)" rx="40"/>
  
  <!-- 外圈环形数据流 -->
  <circle cx="200" cy="175" r="95" fill="none" stroke="#0f3460" stroke-width="3" stroke-dasharray="6,4"/>
  <circle cx="200" cy="175" r="75" fill="none" stroke="#533483" stroke-width="2" stroke-dasharray="4,6" opacity="0.6"/>
  
  <!-- 核心 E 字母 -->
  <text x="200" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="72" font-weight="900" fill="url(#chart)" filter="url(#glow)">E</text>
  
  <!-- 署名 -->
  <text x="200" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a0a0c0" letter-spacing="6">THAN</text>
  
  <!-- 分隔线 -->
  <rect x="145" y="235" width="110" height="4" rx="2" fill="url(#chart)" opacity="0.5"/>
  
  <!-- 身份 -->
  <text x="200" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8888aa" letter-spacing="4">效果信任官</text>
  
  <line x1="175" y1="285" x2="225" y2="285" stroke="#0f3460" stroke-width="1" opacity="0.4"/>
  
  <!-- 跳动的数据点 -->
  <circle cx="200" cy="310" r="3" fill="#0f9bff" opacity="0.8">
    <animate attributeName="r" values="2;5;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="185" cy="308" r="2" fill="#00d2ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="215" cy="308" r="2" fill="#00d2ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="295" r="1.5" fill="#00d2ff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="295" r="1.5" fill="#00d2ff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 角落数据连线点缀 -->
  <line x1="110" y1="100" x2="90" y2="80" stroke="#0f9bff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="290" y1="100" x2="310" y2="80" stroke="#0f9bff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="110" y1="250" x2="90" y2="270" stroke="#0f9bff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="290" y1="250" x2="310" y2="270" stroke="#0f9bff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  
  <!-- 底部数据小横条 -->
  <rect x="140" y="340" width="30" height="3" rx="1.5" fill="#0f9bff" opacity="0.4"/>
  <rect x="175" y="337" width="50" height="3" rx="1.5" fill="#00d2ff" opacity="0.6"/>
  <rect x="230" y="340" width="30" height="3" rx="1.5" fill="#0f9bff" opacity="0.4"/>
</svg>
